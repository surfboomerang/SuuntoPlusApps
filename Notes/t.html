<uiView onLoad="navigate('#uiViewSet1', 0);">

  <div id="suuntoplus">

    <div class="cm-fg" style="width:100%;height:15%;">
      <div class="sp-t-m p-hc" style="top:calc(50% - 50%e);">Notes</div>
    </div>

    <uiViewSet id="uiViewSet1" style="top:17%;left:12%;width:75%;height:65%">
      <div class="sp-t-s p-hc" style="white-space:wrap" id="noteText-0">Loading note...</div>
      <div class="sp-t-m p-hc" style="white-space:wrap;" id="noteText-1">Loading note...</div>
      <div class="sp-t-l p-hc" style="white-space:wrap;" id="noteText-2">Loading note...</div>

    </uiViewSet>
    <div class="cm-fg" style="top:85%;width:100%;height:15%;">
      <div class="sp-t-m p-hc" optional style="top:calc(50% - 50%e);" id="noteFooter">0 / 0</div>
    </div>
  </div>

  <userInput>
    <pushButton name="up" onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
      onLongPressStart="next('#uiViewSet1');$.put('/Zapp/{zapp_index}/Event', 2, null, 'int32');" />
    <pushButton name="down" onClick="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
      onLongPressStart="previous('#uiViewSet1');$.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');" />
  </userInput>

</uiView>
