<uiView>

  <div id="suuntoplus">

    <!-- Title and its background -->
    <div id=title class="cm-fg" style="width:100%;height:20%">
      <div id="titleHeader" class="sp-t-m p-hc" style="top:calc(30% - 50%e)">
        TARGET
      </div>
      <div id="titleText" class="sp-t-s p-hc" style="top:calc(70% - 50%e)">
        <eval input="/Navigation/Poi/Active/Coordinates" outputFormat="auto" default="--" />
      </div>
    </div>

    <!-- vertical separator -->
    <div class="cm-fg p-hc" style="top:25%;width:2px;height:45%;opacity:0.4"></div>

    <!-- left -->
    <div class="sp-vertical-center" style="top:23%;left:calc(20% - 50%e)">
      Speed
    </div>
    <div class="sp-vertical-center" style="top:28%;left:calc(30% - 50%e)">
      <span class="sp-d-s f-num" style="padding-top: 4px;">
        <eval input="/Activity/Current/Speed" outputFormat="{zapp_speed_format}" default="--" />
      </span>
      <span>
        <postfix />
      </span>
    </div>

    <div class="sp-vertical-center" style="top:48%;left:calc(20% - 50%e)">
      Heading
    </div>
    <div class="sp-vertical-center" style="top:53%;left:calc(30% - 50%e)">
      <span class="sp-d-s f-num" style="padding-top: 4px;">
        <eval input="/Fusion/Heading" outputFormat="CompassHeadingDeg_Accurate" default="--" />
      </span>
      <span>
        <postfix />
      </span>
    </div>

    <!-- right -->
    <div class="sp-vertical-center" style="top:23%;left:calc(65% - 50%e)">
      VMC
    </div>
    <div class="sp-vertical-center" style="top:28%;left:calc(75% - 50%e)">
      <span class="sp-d-s f-num" style="padding-top: 4px;">
        <eval input="/Zapp/{zapp_index}/Output/VMC" outputFormat="{zapp_speed_format}" default="--" />
      </span>
      <span>
        <postfix />
      </span>
    </div>

    <div class="sp-vertical-center" style="top:48%;left:calc(65% - 50%e)">
      Target
    </div>
    <div class="sp-vertical-center" style="top:53%;left:calc(75% - 50%e)">
      <span class="sp-d-s f-num" style="padding-top: 4px;">
        <eval input="/Navigation/Poi/Active/Bearing" outputFormat="CompassHeadingDeg_Accurate" default="--" />
      </span>
      <span>
        <postfix />
      </span>
    </div>

    <!-- bottom -->
    <div class="sp-vertical-center p-hc" style="top:73%">
      Distance
    </div>
    <div class="sp-vertical-center p-hc" style="top:78%">
      <span class="sp-d-s f-num" style="padding-top: 4px;">
        <eval input="/Navigation/Poi/Active/Distance" outputFormat="{zapp_distance_format}" default="--" />
      </span>
      <span>
        <postfix />
      </span>
    </div>

  </div>

</uiView>
