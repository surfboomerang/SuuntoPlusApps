<!-- SuuntoPlus: Template with 3 fields (2 alternatives) with units -->
<uiView>

  <div id="suuntoplus">

    <!-- Title and its background -->
    <div class="cm-fg" style="width:100%;height:15%">
      <div class="sp-t-m p-hc" style="top:calc(60% - 50%e)">
        VMC
      </div>
    </div>

    <!-- vertical separator -->
    <div class="cm-fg p-hc" style="top:20%;width:2px;height:40%;opacity:0.4"></div>

    <!-- top -->
    <!-- left -->
    <div class="sp-t-s" style="top:calc(30% - 100%e);left:calc(26% - 50%e)">
      Speed
    </div>
    <div class="sp-vertical-center" style="top:32%;left:calc(26% - 50%e)">
      <span class="sp-d-s f-num">
        <eval input="/Activity/Current/Speed" outputFormat="{zapp_speed_format}" default="--" />
      </span>
      <span optional>
        <postfix />
      </span>
    </div>

    <!-- right -->
    <div class="sp-t-s" style="top:calc(30% - 100%e);left:calc(74% - 50%e)">
      VMC
    </div>
    <div class="sp-vertical-center" style="top:32%;left:calc(74% - 50%e)">
      <span class="sp-d-s f-num">
        <eval input="/Zapp/{zapp_index}/Output/VMC" outputFormat="{zapp_speed_format}" default="--" />
      </span>
      <span optional>
        <postfix />
      </span>
    </div>



    <!-- bottom -->
    <div class="sp-t-s p-hc" style="top:calc(70% - 50%e)">
      Distance to target
    </div>
    <div class="p-hc" style="top:calc(82% - 50%e)">
      <span class="sp-d-s f-num">
      <eval input="/Navigation/Poi/Active/Distance" outputFormat="{zapp_distance_format}" default="--" />
      </span>
    <span optional class="sp-t-s">
      <postfix />
    </span>
    </div>
  </div>

</uiView>
